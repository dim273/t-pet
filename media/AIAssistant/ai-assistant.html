<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 编程助手</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --vscode-bg: #1e1e1e;
            --vscode-sidebar-bg: #252526;
            --vscode-tab-border: #454545;
            --vscode-text: #d4d4d4;
            --vscode-accent: #3794ff;
            --vscode-accent-hover: #4da1ff;
            --vscode-button-bg: #0e639c;
            --vscode-button-hover: #1177bb;
            --vscode-input-bg: #3c3c3c;
            --vscode-input-border: #454545;
            --vscode-highlight: #363636;
            --transition-speed: 0.3s;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--vscode-sidebar-bg);
            color: var(--vscode-text);
            font-size: 13px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 侧边栏样式 */
        .sidebar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 100;
            display: none;
            backdrop-filter: blur(2px);
        }

        .sidebar {
            position: absolute;
            top: 0;
            left: -280px;
            width: 280px;
            height: 100%;
            background: var(--vscode-sidebar-bg);
            border-right: 1px solid var(--vscode-tab-border);
            z-index: 101;
            transition: left var(--transition-speed) ease;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.3);
        }

        .sidebar.active {
            left: 0;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--vscode-tab-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .new-chat-btn {
            background: var(--vscode-button-bg);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .new-chat-btn:hover {
            background: var(--vscode-button-hover);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .history-item {
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 4px;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:hover {
            background: var(--vscode-highlight);
        }

        .history-item.active {
            background: rgba(55, 148, 255, 0.15);
            border-left: 3px solid var(--vscode-accent);
        }

        .history-title {
            font-size: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .delete-session {
            opacity: 0;
            font-size: 14px;
            color: #ff4d4f;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .history-item:hover .delete-session {
            opacity: 1;
        }

        .sidebar-close {
            background: transparent;
            border: none;
            color: var(--vscode-text);
            font-size: 20px;
            cursor: pointer;
            opacity: 0.7;
        }

        .sidebar-close:hover {
            opacity: 1;
        }

        .header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--vscode-tab-border);
            background-color: var(--vscode-bg);
            position: relative;
        }

        .menu-toggle {
            background: transparent;
            border: none;
            color: var(--vscode-text);
            font-size: 18px;
            cursor: pointer;
            margin-right: 10px;
            padding: 5px;
            display: flex;
            align-items: center;
        }

        .back-btn {
            background: transparent;
            border: none;
            color: var(--vscode-text);
            font-size: 18px;
            cursor: pointer;
            margin-right: 10px;
            padding: 0 10px;
            border-radius: 4px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 30px;
            height: 30px;
        }

        .back-btn:hover {
            background: var(--vscode-highlight);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .init-state {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            opacity: 0.7;
            transition: opacity 0.4s ease;
            z-index: 2;
        }

        .init-state.hidden {
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }

        .init-state h2 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--vscode-accent);
        }

        .init-state p {
            font-size: 12px;
            line-height: 1.5;
            max-width: 300px;
        }

        .features {
            display: flex;
            justify-content: space-between;
            max-width: 360px;
            margin-top: 25px;
        }

        .feature {
            flex: 1;
            padding: 10px;
            margin: 0 4px;
            background: rgba(55, 148, 255, 0.1);
            border-radius: 6px;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .feature:hover {
            background: rgba(55, 148, 255, 0.2);
            transform: translateY(-3px);
        }

        .feature-icon {
            font-size: 20px;
            margin-bottom: 6px;
            color: var(--vscode-accent);
        }

        .feature-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .feature-desc {
            font-size: 11px;
            opacity: 0.8;
        }

        .chat-content {
            padding: 16px;
            flex: 1;
            display: none;
        }

        .input-area {
            padding: 0 16px 16px;
            border-top: 1px solid var(--vscode-tab-border);
            background-color: var(--vscode-bg);
            position: relative;
        }

        .mode-container {
            display: flex;
            margin: 0 -4px 12px;
            position: relative;
            overflow: hidden;
            height: 36px;
        }

        .mode-indicator {
            position: absolute;
            bottom: 0;
            height: 3px;
            background: var(--vscode-accent);
            border-radius: 3px;
            transition: all var(--transition-speed) cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .mode-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--vscode-text);
            padding: 8px 6px;
            cursor: pointer;
            font-size: 11px;
            position: relative;
            transition: color 0.2s ease;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-radius: 4px;
            margin: 0 4px;
        }

        .mode-btn.active {
            color: var(--vscode-accent);
        }

        .input-group {
            display: none;
            flex-direction: column;
            transition: all var(--transition-speed) ease;
        }

        .input-group.active {
            display: flex;
        }

        .problem-id-input {
            background: var(--vscode-input-bg);
            color: var(--vscode-text);
            border: 1px solid var(--vscode-input-border);
            border-radius: 4px;
            padding: 8px 12px;
            margin-bottom: 8px;
            height: 36px;
            font-size: 13px;
        }

        .problem-id-input::placeholder {
            color: var(--vscode-text);
            opacity: 0.6;
        }

        .text-input {
            width: 100%;
            background: var(--vscode-input-bg);
            color: var(--vscode-text);
            border: 1px solid var(--vscode-input-border);
            border-radius: 4px;
            padding: 10px 40px 10px 12px;
            resize: none;
            height: 60px;
            font-size: 13px;
            line-height: 1.5;
            transition: border-color 0.2s ease;
        }

        .text-input:focus {
            outline: none;
            border-color: var(--vscode-accent);
        }

        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .code-checkbox {
            display: flex;
            align-items: center;
            font-size: 12px;
        }

        .code-checkbox input {
            margin-right: 8px;
        }

        .send-btn {
            background: var(--vscode-button-bg);
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .send-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .send-btn:hover {
            background: var(--vscode-button-hover);
            transform: scale(1.05);
        }

        .send-btn:hover::before {
            opacity: 1;
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        .send-btn svg {
            transition: transform 0.3s ease;
        }

        .send-btn:hover svg {
            transform: translateX(2px);
        }

        /* 统一消息布局 */
        .message {
            margin-bottom: 20px;
            display: flex;
            max-width: 100%;
            align-self: flex-start;
            opacity: 0;
            transform: translateY(10px);
            animation: messageAppear 0.3s forwards;
        }

        .message-content {
            display: flex;
            flex-direction: column;
            position: relative;
            max-width: calc(100% - 30px);
            animation: messageAppear 0.3s forwards;
        }

        .message-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 5px;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            margin-right: 10px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--vscode-button-bg);
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .user .avatar {
            background: #4caf50;
        }

        .name {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        .message-body {
            padding: 10px 15px;
            border-radius: 8px;
            line-height: 1.5;
            max-width: calc(100% - 40px);
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user .message-body {
            background: rgba(59, 134, 255, 0.2);
        }

        .assistant .message-body {
            background: rgba(55, 148, 255, 0.1);
        }

        .timestamp {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 5px;
            text-align: right;
            width: 100%;
        }

        .message-footer {
            font-size: 10px;
            opacity: 0.5;
            margin-top: 2px;
            font-style: italic;
            color: var(--vscode-descriptionForeground);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .message-footer::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 1px;
            background: currentColor;
            opacity: 0.3;
        }

        @keyframes messageAppear {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .code-block {
            background: rgba(30, 30, 30, 0.5);
            font-family: 'Courier New', monospace;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            margin: 10px 0;
            white-space: pre-wrap;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow-x: auto;
            max-width: 100%;
        }

        .olist {
            padding-left: 20px;
            margin: 10px 0;
        }

        .olist li {
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .assistant .message-body p,
        .assistant .message-body ul,
        .assistant .message-body ol {
            margin-bottom: 12px;
        }

        /* 思考过程样式 */
        .thought-container {
            margin-bottom: 10px;
            border-left: 2px solid #555;
            padding-left: 10px;
        }

        .thought-header {
            font-size: 12px;
            color: #888;
            cursor: pointer;
            display: flex;
            align-items: center;
            user-select: none;
            margin-bottom: 4px;
        }

        .thought-header::before {
            content: '▶';
            display: inline-block;
            margin-right: 5px;
            font-size: 8px;
            transition: transform 0.2s;
        }

        .thought-container.expanded .thought-header::before {
            transform: rotate(90deg);
        }

        .thought-content {
            font-size: 12px;
            color: #777;
            display: none;
            line-height: 1.4;
        }

        .thought-container.expanded .thought-content {
            display: block;
        }

        .thought-container.streaming .thought-content {
            display: block;
        }

        .thought-container.streaming .thought-header::before {
            content: '●';
            color: var(--vscode-accent);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>

<body>
    <div class="header">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <button class="back-btn" id="back-btn" onclick="goBack()">←</button>
        <h3 style="font-weight: 600;">AI编程助手</h3>
    </div>

    <!-- 侧边栏结构 -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" id="new-chat-btn">
                <span>+</span> 新对话
            </button>
            <button class="sidebar-close" id="sidebar-close">&times;</button>
        </div>
        <div class="history-list" id="history-list">
            <!-- 历史记录项将在这里动态生成 -->
        </div>
    </div>

    <div class="chat-container" id="chat-container">
        <div class="init-state" id="init-state">
            <h2>AI编程助手</h2>
            <p>智能辅助, 启发教育</p>

            <div class="features">
                <div class="feature">
                    <div class="feature-icon">💻</div>
                    <div class="feature-title">代码建议</div>
                    <div class="feature-desc">分析工作区代码提供优化建议</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">🧩</div>
                    <div class="feature-title">刷题指导</div>
                    <div class="feature-desc">提供问题分解思路引导思考</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">🌳</div>
                    <div class="feature-title">知识学习</div>
                    <div class="feature-desc">根据进度提供适宜的解释</div>
                </div>
            </div>
        </div>

        <div class="chat-content" id="chat-content">
            <!-- 消息将通过JavaScript动态添加 -->
        </div>
    </div>

    <div class="input-area">
        <div class="mode-container">
            <div class="mode-indicator" id="mode-indicator"></div>
            <button class="mode-btn active" data-mode="code">代码建议</button>
            <button class="mode-btn" data-mode="problem">刷题指导</button>
            <button class="mode-btn" data-mode="knowledge">知识学习</button>
        </div>

        <!-- 代码建议输入区域 -->
        <div class="input-group active" data-mode="code">
            <textarea class="text-input" id="code-input" placeholder="输入关于代码的问题..."></textarea>
            <div class="actions">
                <div class="code-checkbox">
                    <input type="checkbox" id="workspace-code">
                    <label for="workspace-code">向AI提供工作区代码(先选中代码再点击发送哦)</label>
                </div>
                <button class="send-btn" id="send-code">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                        <path
                            d="M20,12a1,1,0,0,1-.29.73l-6.31,6.31a1,1,0,0,1-1.41-1.41L17.59,13H4a1,1,0,0,1,0-2H17.59L12,6.44A1,1,0,0,1,12.72,5a1,1,0,0,1,.69.29l6.31,6.3A1,1,0,0,1,20,12Z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 刷题指导输入区域 -->
        <div class="input-group" data-mode="problem">
            <input type="text" class="problem-id-input" id="problem-id" placeholder="题目编号">
            <textarea class="text-input" id="problem-input" placeholder="输入关于刷题的问题..."></textarea>
            <div class="actions">
                <div></div> <!-- 占位元素 -->
                <button class="send-btn" id="send-problem">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                        <path
                            d="M20,12a1,1,0,0,1-.29.73l-6.31,6.31a1,1,0,0,1-1.41-1.41L17.59,13H4a1,1,0,0,1,0-2H17.59L12,6.44A1,1,0,0,1,12.72,5a1,1,0,0,1,.69.29l6.31,6.3A1,1,0,0,1,20,12Z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>

        <!-- 知识学习输入区域 -->
        <div class="input-group" data-mode="knowledge">
            <input type="text" class="problem-id-input" id="knowledge-input-text" placeholder="知识点名称">
            <textarea class="text-input" id="knowledge-input" placeholder="输入关于知识点的问题..."></textarea>
            <div class="actions">
                <div></div> <!-- 占位元素 -->
                <button class="send-btn" id="send-knowledge">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                        <path
                            d="M20,12a1,1,0,0,1-.29.73l-6.31,6.31a1,1,0,0,1-1.41-1.41L17.59,13H4a1,1,0,0,1,0-2H17.59L12,6.44A1,1,0,0,1,12.72,5a1,1,0,0,1,.69.29l6.31,6.3A1,1,0,0,1,20,12Z">
                        </path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!--SCRIPT_PLACEHOLDER-->
</body>

</html>
