<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 编程助手</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <link href="../styles/variables.css" rel="stylesheet">
    <link href="../styles/base.css" rel="stylesheet">
    <link href="../styles/button.css" rel="stylesheet">
    <link href="ai-assistant.css" rel="stylesheet">
</head>

<body>
    <div class="tp-header">
        <button class="tp-menu-toggle" id="menu-toggle">
            <i class="fa fa-bars"></i>
        </button>
        <button class="tp-back-btn" id="back-btn" onclick="goBack()">
            <i class="fa fa-arrow-left"></i>
        </button>
        <h3 class="tp-header-title">AI编程助手</h3>
    </div>

    <div class="tp-sidebar-overlay" id="sidebar-overlay"></div>
    <div class="tp-sidebar" id="sidebar">
        <div class="tp-sidebar-header">
            <button class="tp-new-chat-btn" id="new-chat-btn">
                <i class="fa fa-plus"></i> 新对话
            </button>
            <button class="tp-sidebar-close" id="sidebar-close">&times;</button>
        </div>
        <div class="tp-history-list" id="history-list">
        </div>
    </div>

    <div class="tp-chat-container" id="chat-container">
        <div class="tp-init-state" id="init-state">
            <h2>AI编程助手</h2>
            <p>智能辅助, 启发教育</p>

            <div class="tp-features">
                <div class="tp-feature">
                    <div class="tp-feature-icon">
                        <i class="fa fa-code"></i>
                    </div>
                    <div class="tp-feature-title">代码建议</div>
                    <div class="tp-feature-desc">分析工作区代码提供优化建议</div>
                </div>
                <div class="tp-feature">
                    <div class="tp-feature-icon">
                        <i class="fa fa-puzzle-piece"></i>
                    </div>
                    <div class="tp-feature-title">刷题指导</div>
                    <div class="tp-feature-desc">提供问题分解思路引导思考</div>
                </div>
                <div class="tp-feature">
                    <div class="tp-feature-icon">
                        <i class="fa fa-tree"></i>
                    </div>
                    <div class="tp-feature-title">知识学习</div>
                    <div class="tp-feature-desc">根据进度提供适宜的解释</div>
                </div>
            </div>
        </div>

        <div class="tp-chat-content" id="chat-content">
        </div>
    </div>

    <div class="tp-input-area">
        <div class="tp-mode-container">
            <div class="tp-mode-indicator" id="mode-indicator"></div>
            <button class="tp-mode-btn active" data-mode="code">代码建议</button>
            <button class="tp-mode-btn" data-mode="problem">刷题指导</button>
            <button class="tp-mode-btn" data-mode="knowledge">知识学习</button>
        </div>

        <div class="tp-input-group active" data-mode="code">
            <textarea class="tp-text-input" id="code-input" placeholder="输入关于代码的问题..."></textarea>
            <div class="tp-actions">
                <div class="tp-code-checkbox">
                    <input type="checkbox" id="workspace-code">
                    <label for="workspace-code">向AI提供工作区代码(先选中代码再点击发送哦)</label>
                </div>
                <button class="tp-send-btn" id="send-code">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                        <path d="M20,12a1,1,0,0,1-.29.73l-6.31,6.31a1,1,0,0,1-1.41-1.41L17.59,13H4a1,1,0,0,1,0-2H17.59L12,6.44A1,1,0,0,1,12.72,5a1,1,0,0,1,.69.29l6.31,6.3A1,1,0,0,1,20,12Z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="tp-input-group" data-mode="problem">
            <input type="text" class="tp-problem-id-input" id="problem-id" placeholder="题目编号">
            <textarea class="tp-text-input" id="problem-input" placeholder="输入关于刷题的问题..."></textarea>
            <div class="tp-actions">
                <div></div>
                <button class="tp-send-btn" id="send-problem">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                        <path d="M20,12a1,1,0,0,1-.29.73l-6.31,6.31a1,1,0,0,1-1.41-1.41L17.59,13H4a1,1,0,0,1,0-2H17.59L12,6.44A1,1,0,0,1,12.72,5a1,1,0,0,1,.69.29l6.31,6.3A1,1,0,0,1,20,12Z"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="tp-input-group" data-mode="knowledge">
            <input type="text" class="tp-problem-id-input" id="knowledge-input-text" placeholder="知识点名称">
            <textarea class="tp-text-input" id="knowledge-input" placeholder="输入关于知识点的问题..."></textarea>
            <div class="tp-actions">
                <div></div>
                <button class="tp-send-btn" id="send-knowledge">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white">
                        <path d="M20,12a1,1,0,0,1-.29.73l-6.31,6.31a1,1,0,0,1-1.41-1.41L17.59,13H4a1,1,0,0,1,0-2H17.59L12,6.44A1,1,0,0,1,12.72,5a1,1,0,0,1,.69.29l6.31,6.3A1,1,0,0,1,20,12Z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!--SCRIPT_PLACEHOLDER-->
</body>

</html>
