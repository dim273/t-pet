<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日历打卡</title>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <link href="styles/variables.css" rel="stylesheet">
  <link href="styles/base.css" rel="stylesheet">
  <link href="styles/calender.css" rel="stylesheet">
</head>

<body>
  <div class="tp-calendar-container">
    <div class="tp-calendar-header">
      <button class="tp-back-btn" onclick="goBack()">
        <i class="fa fa-arrow-left"></i>
      </button>
      <div>
        <h1 class="tp-calendar-title">打卡日志</h1>
        <p id="current-date"></p>
      </div>
      <div>
        <span id="weekday" class="tp-calendar-title"></span>
      </div>
    </div>

    <div class="tp-calendar-grid">
      <div class="tp-calendar-nav">
        <button id="prev-month" class="tp-calendar-nav-btn">
          <i class="fa fa-chevron-left"></i>
        </button>
        <h2 id="current-month" class="tp-calendar-month"></h2>
        <button id="next-month" class="tp-calendar-nav-btn">
          <i class="fa fa-chevron-right"></i>
        </button>
      </div>

      <div class="tp-calendar-weekdays">
        <div class="tp-calendar-weekday">日</div>
        <div class="tp-calendar-weekday">一</div>
        <div class="tp-calendar-weekday">二</div>
        <div class="tp-calendar-weekday">三</div>
        <div class="tp-calendar-weekday">四</div>
        <div class="tp-calendar-weekday">五</div>
        <div class="tp-calendar-weekday">六</div>
      </div>

      <div id="calendar-days" class="tp-calendar-days">
      </div>
    </div>

    <div class="tp-calendar-stats">
      <div class="tp-calendar-stat">
        <div class="tp-calendar-stat-icon tp-stat-success">
          <i class="fa fa-check-circle"></i>
        </div>
        <h3 class="tp-calendar-stat-label">本月打卡</h3>
        <p id="check-in-count" class="tp-calendar-stat-value">0</p>
      </div>
      <div class="tp-calendar-stat">
        <div class="tp-calendar-stat-icon tp-stat-warning">
          <i class="fa fa-trophy"></i>
        </div>
        <h3 class="tp-calendar-stat-label">打卡率</h3>
        <p id="check-in-rate" class="tp-calendar-stat-value">0%</p>
      </div>
    </div>
  </div>

  <script>
    const vscode = acquireVsCodeApi();
    function goBack() {
      vscode.postMessage({ type: 'goBack' });
    }

    let checkInRecords = {};

    document.addEventListener('DOMContentLoaded', () => {
      const currentDateEl = document.getElementById('current-date');
      const weekdayEl = document.getElementById('weekday');
      const currentMonthEl = document.getElementById('current-month');
      const calendarDaysEl = document.getElementById('calendar-days');
      const prevMonthBtn = document.getElementById('prev-month');
      const nextMonthBtn = document.getElementById('next-month');
      const checkInCountEl = document.getElementById('check-in-count');
      const checkInRateEl = document.getElementById('check-in-rate');

      let currentYear = new Date().getFullYear();
      let currentMonth = new Date().getMonth();

      const weekDays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];

      function updateDisplay() {
        const now = new Date();
        const dateStr = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日`;
        currentDateEl.textContent = dateStr;
        weekdayEl.textContent = weekDays[now.getDay()];
        renderCalendar();
        updateStats();
      }

      function renderCalendar() {
        const firstDay = new Date(currentYear, currentMonth, 1).getDay();
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        const today = new Date();

        currentMonthEl.textContent = `${currentYear}年${currentMonth + 1}月`;
        calendarDaysEl.innerHTML = '';

        for (let i = 0; i < firstDay; i++) {
          const emptyDay = document.createElement('div');
          emptyDay.className = 'tp-calendar-day tp-calendar-day-empty';
          calendarDaysEl.appendChild(emptyDay);
        }

        for (let day = 1; day <= daysInMonth; day++) {
          const dayEl = document.createElement('div');
          dayEl.className = 'tp-calendar-day';
          dayEl.textContent = day;

          const dateKey = `${currentYear}-${currentMonth + 1}-${day}`;

          if (checkInRecords[dateKey]) {
            dayEl.classList.add('tp-calendar-day-checked');
          }

          if (currentYear === today.getFullYear() &&
              currentMonth === today.getMonth() &&
              day === today.getDate()) {
            dayEl.classList.add('tp-calendar-day-today');
          }

          // 打卡功能已移除
          calendarDaysEl.appendChild(dayEl);
        }
      }

      function toggleCheckIn(dateKey, dayEl) {
        if (checkInRecords[dateKey]) {
          delete checkInRecords[dateKey];
          dayEl.classList.remove('tp-calendar-day-checked');
        } else {
          checkInRecords[dateKey] = true;
          dayEl.classList.add('tp-calendar-day-checked');
        }
        vscode.postMessage({ type: 'saveCheckIn', records: checkInRecords });
        updateStats();
      }

      function updateStats() {
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
        const today = new Date();
        const isCurrentMonth = currentYear === today.getFullYear() && currentMonth === today.getMonth();
        const targetDay = isCurrentMonth ? today.getDate() : daysInMonth;

        let checkInCount = 0;
        for (let day = 1; day <= targetDay; day++) {
          const dateKey = `${currentYear}-${currentMonth + 1}-${day}`;
          if (checkInRecords[dateKey]) {
            checkInCount++;
          }
        }

        const checkInRate = targetDay > 0 ? Math.round((checkInCount / targetDay) * 100) : 0;
        checkInCountEl.textContent = checkInCount;
        checkInRateEl.textContent = `${checkInRate}%`;
      }

      prevMonthBtn.addEventListener('click', () => {
        currentMonth--;
        if (currentMonth < 0) {
          currentMonth = 11;
          currentYear--;
        }
        renderCalendar();
        updateStats();
      });

      nextMonthBtn.addEventListener('click', () => {
        currentMonth++;
        if (currentMonth > 11) {
          currentMonth = 0;
          currentYear++;
        }
        renderCalendar();
        updateStats();
      });

      window.addEventListener('message', (event) => {
        if (event.data.type === 'loadCheckIn' && event.data.records) {
          checkInRecords = event.data.records;
          updateDisplay();
        }
      });

      vscode.postMessage({ type: 'requestCheckIn' });
      updateDisplay();
    });
  </script>
</body>

</html>
