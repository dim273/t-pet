<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>主菜单</title>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <link href="styles/variables.css" rel="stylesheet">
  <link href="styles/base.css" rel="stylesheet">
  <link href="styles/button.css" rel="stylesheet">
  <link href="menu.css" rel="stylesheet">
</head>

<body>
  <div class="tp-menu">

    <div class="tp-logo-container">
      <img src="{{logo}}" alt="TPet Logo" class="tp-logo">
    </div>

    <div class="tp-menu-row">
      <button id="switchPageTotree" class="tp-menu-btn">
        <i class="fa fa-tree tp-menu-btn-icon"></i>
        <span>知识树</span>
      </button>
      <button id="switchPageToAiChat" class="tp-menu-btn tp-menu-btn-primary">
        <i class="fa fa-commenting tp-menu-btn-icon"></i>
        <span>AI助手</span>
      </button>
    </div>

    <div class="tp-menu-row">
      <button id="switchPageToReProblemList" class="tp-menu-btn">
        <i class="fa fa-book tp-menu-btn-icon"></i>
        <span>题单</span>
      </button>
      <button id="switchPageToAbilityMap" class="tp-menu-btn">
        <i class="fa fa-line-chart tp-menu-btn-icon"></i>
        <span>能力图谱</span>
      </button>
    </div>

    <div class="tp-menu-row">
      <button id="switchPageToCalender" class="tp-menu-btn">
        <i class="fa fa-calendar tp-menu-btn-icon"></i>
        <span>打卡日历</span>
      </button>
      <button id="switchPageToSetting" class="tp-menu-btn">
        <i class="fa fa-cog tp-menu-btn-icon"></i>
        <span>设置</span>
      </button>
    </div>

  </div>

  <script>
    const vscode = acquireVsCodeApi();
    const MainOrigin = "vscode-file://vscode-app";

    document.getElementById('switchPageTotree').addEventListener('click', () => {
      vscode.postMessage({ type: 'switchPageTotree' });
      console.log("点击了知识树按钮");
    });

    document.getElementById('switchPageToAiChat').addEventListener('click', () => {
      vscode.postMessage({ type: 'switchPageToAiChat' });
    });

    document.getElementById('switchPageToAbilityMap').addEventListener('click', () => {
      vscode.postMessage({ type: 'switchPageToAbilityMap' });
    });

    document.getElementById('switchPageToCalender').addEventListener('click', () => {
      vscode.postMessage({ type: 'switchPageToCalender' });
    });

    document.getElementById('switchPageToSetting').addEventListener('click', () => {
      vscode.postMessage({ type: 'switchPageToSetting' });
    });

    document.getElementById('switchPageToReProblemList').addEventListener('click', () => {
      vscode.postMessage({ type: 'switchPageToReProblemList' });
    });

  </script>
</body>

</html>
