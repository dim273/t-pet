<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>能力图谱</title>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
</head>

<body>
  <div class="tp-ability-container">
    <div class="tp-ability-card">
      <div class="tp-chart-container">
        <canvas id="abilityChart"></canvas>
      </div>

      <div class="tp-overall-section">
        <div class="tp-overall-card">
          <h3 class="tp-overall-title">总体掌握度</h3>
          <div class="tp-overall-progress-bar">
            <div class="tp-overall-progress-track">
              <div id="overallProgress" class="tp-overall-progress-fill" style="width: 0%"></div>
            </div>
            <span id="overallPercentage" class="tp-overall-percentage">0%</span>
          </div>
        </div>
      </div>

      <div>
        <h3 class="tp-ability-details-title">能力详情</h3>
        <div id="abilityDetails" class="tp-ability-grid">
        </div>
      </div>
    </div>
  </div>
</body>

</html>
