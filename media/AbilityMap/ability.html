<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>能力图谱</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.8/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="ability.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4F46E5',
            secondary: '#10B981',
            accent: '#d4d4d4',
            light: '#F3F4F6',
            dark: '#1e1e1e'
          },
          fontFamily: {
            inter: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
</head>

<body class="min-h-screen font-inter text-light">
  <div class="max-w-4xl mx-auto px-4 py-8">


    <div class="bg-gray-800 rounded-xl p-6 shadow-lg">
      <div class="chart-container">
        <canvas id="abilityChart"></canvas>
      </div>

      <div class="mt-8">
        <div class="bg-gray-700 rounded-lg p-4">
          <h3 class="text-lg font-semibold mb-2">总体掌握度</h3>
          <div class="flex items-center">
            <div class="w-full bg-gray-600 rounded-full h-2.5">
              <div id="overallProgress" class="bg-green-500 h-2.5 rounded-full" style="width: 0%"></div>
            </div>
            <span id="overallPercentage" class="ml-4 text-lg font-bold">0%</span>
          </div>
        </div>
      </div>

      <div class="mt-6">
        <h3 class="text-lg font-semibold mb-2">能力详情</h3>
        <div id="abilityDetails" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <!-- 能力详情将通过JavaScript动态生成 -->
        </div>
      </div>
    </div>
  </div>

  <script src="ability.js"></script>
  <script>
    // 页面加载完成后初始化
    window.onload = function () {
      console.log('Page loaded, initializing ability map...');
      console.log('window.abilityMap:', window.abilityMap);
      if (window.abilityMap && window.abilityMap.init) {
        window.abilityMap.init();
      } else {
        console.error('window.abilityMap or init method not found');
      }
    };
  </script>
</body>

</html>
